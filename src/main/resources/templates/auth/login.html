<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up</title>
        <link rel="stylesheet" href="main.css">

    </head>
    <body>
        <div class = "backContainer">
            <a href="/index" class="bigButton backButton">Back</a>
        </div>

        <h1 id="loginTitle" class="title centerText">Customer Login</h1>

        <h2 th:text="${error_message}" class="errorMessage centerText"></h2>
        
        <div class="formContainer">
            <form action="/login" method="POST">
                <div class="radioButtons formInput">
                    <input type="radio" id="customer" name="signtype" value="customer" onchange="loginDisp()" checked>
                    <label for="customer">Customer</label>
        
                    <input type="radio" id="admin" name="signtype" value="admin" onchange="loginDisp()">
                    <labnel for="admin">Admin</labnel><br>
                </div>

                <label for="username">Username: </label>
                <input type="text" id="username" name="username" class="formInput"><br>
    
                <label for="password">Password: </label>
                <input type="text" id="password" name="password" class="formInput"><br>

                <input type="submit" class="bigButton authButton" value="Login">
            </form>
        </div>




        <script src="main.js"></script>
    </body>
</html>
