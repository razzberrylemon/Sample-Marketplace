<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">

</head>
<body>
    <div id="menuBar">
        <a href="/adminHome" class = "bigButton homeButton">Home</a>
        <a href="/admin_logout" class = "bigButton logoutButton">Logout</a>
    </div>

    <table style="width: 200px;">
        <thead>
            <tr>
                <th>Product : Quantity</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <p  th:each="quantity : ${order.quantities}">
                        <span th:text="${quantity.product.name}"></span> : <span th:text="${quantity.quantity}"></span>
                    </p>
                </td>
            </tr>
        </tbody>
    </table>
    <h1 class="centerText">Total: €<span th:text="${order.totalCost}"></span></h1>
 
    <div class = "formContainer">
        <form action="#" th:action="@{/save_order(order_id=${order.id})}" th:object="${order}" method="POST">
            <label for="status">Update Status: </label>
            <select id="status" name="status">
                <option value="Processing">Processing</option>
                <option value="Processed">Processed</option>
                <option value="Shipped">Shipped</option>
                <option value="Delivered">Delivered</option>
                <option value="Cancelled">Cancelled</option>
            </select> 
            <br> <br>

            <input type="submit" class="bigButton saveButton" value="Save!">
        </form>
    </div>

</body>
</html>
