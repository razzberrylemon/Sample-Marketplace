<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">

</head>
<body>
    <div id="menuBar">
        <a href="/customerHome" class = "bigButton homeButton">Home</a>
        <a href="/customer_logout" class = "bigButton logoutButton">Logout</a>
    </div>

    <h2 th:text="${errorMessage}" class="errorMessage centerText"></h2>
    <table class="spacing">
        <thead>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th></th>
                <th></th>
                <th>Price</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="quantity : ${order.quantities}">
                <td th:text="${quantity.product.name}"></td>
                <td th:text="${quantity.quantity}" class="quantity"></td>
                <td style="width: 20px"><a th:href="@{/cartUpdate(product_id=${quantity.product.id}, inc=${true})}" class="littleButton">+</a></td>
                <td style="width: 20px"><a th:href="@{/cartUpdate(product_id=${quantity.product.id}, inc=${false})}" class="littleButton">-</a></td>
                <td class="price">€<span th:text="${quantity.product.price}"></span></td>
                <td><a th:href="@{/remove(product_id=${quantity.product.id})}" class="littleButton">Remove</a></td>
            </tr>
        </tbody>
    </table>

    <div class="center">
        <h1 class="spacing">Total: €<span th:text="${order.totalCost}"></span></h1>
        <br>
        <a href="/purchase" class = "bigButton cartButton">Purchase</a>
    </div>

</body>
</html>
